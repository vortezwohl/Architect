interface:
  display_name: "Architect Design"
  short_description: "Manual-only: repo-first architecture design with full GoF comparison"
  default_prompt: "Run only when the user explicitly invokes $architect-design. First perform minimal context extraction and establish basic repository understanding. Then read decision-protocol.md, source-article.md, and gof-patterns.md in that order before external architecture learning. Before recommending the architecture, explicitly confirm both compatibility and functional boundaries: target functionality, protected related functionality, explicit non-goals, compatibility obligations, and build hard-stop condition. Record a broad evidence-based code impact scope as a reference, not a hard path limit. Recommend one approved design bundle with explicit functional boundaries, code impact scopes, pattern decisions, external evidence decisions, rejected neighbors, and verification seams. Do not auto-invoke $architect-propose or $architect-build."
