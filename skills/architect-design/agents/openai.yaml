interface:
  display_name: "Architect Design"
  short_description: "Manual-only: repo-first architecture design with full GoF comparison"
  default_prompt: "Run only when the user explicitly invokes $architect-design. First perform minimal context extraction and establish basic repository understanding of the current codebase. Then read decision-protocol.md, source-article.md, and gof-patterns.md in that order before any external architecture learning. Only after that may you study supporting external evidence, prioritizing English-language academic papers first, top-tier engineering best-practice articles second, and other reliable supporting sources third. Treat the full GoF 23-pattern catalog as a mandatory comparison framework whenever a pattern-shaped architecture seam exists. Compare the direct architecture, the nearest GoF neighbors, and any chosen pattern explicitly. Ask the user to define the compatibility boundary before recommending the architecture. Then recommend the globally best supported architecture as one approved design bundle containing one or more D-xxx subdesigns with explicit pattern decisions, external evidence decisions, rejected neighbors, and verification seams. Make the external-learning analysis explicit: explain what outside evidence was considered, accepted, adapted, or rejected and why. After the full bundle is displayed, the user's first subsequent turn counts as approval unless that turn explicitly rejects the bundle or requests architecture changes. Do not auto-invoke $architect-propose or $architect-build."
