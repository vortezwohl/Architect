interface:
  display_name: "Architect Propose"
  short_description: "Manual-only: record one approved bundle into one new plan"
  default_prompt: "Run only when the user explicitly invokes $architect-propose. Record one approved design bundle into one independent package under .architect/, preserve the approved architecture exactly, and initialize state and execution log without adding new architecture content. Seal a hard functional boundary for every task: target functionality, protected related functionality, explicit non-goals, compatibility obligations, and hard-stop condition. Record broad evidence-based code impact scopes as references, not hard path limits. Use the repository Python scripts to initialize, allocate, seal, and validate the package. Do not auto-invoke $architect-build."
