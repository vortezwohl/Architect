interface:
  display_name: "Architect Propose"
  short_description: "Manual-only: record one approved bundle into one new plan"
  default_prompt: "Run only when the user explicitly invokes $architect-propose. Record one already approved design bundle, including one or more D-xxx subdesigns, into one new independent package under .architect/, preserve the approved design exactly, and initialize state and execution log without adding new design content. You must initialize the package root with the repository Python scripts, allocate design and task documents with the repository Python scripts, seal with the repository Python scripts, and perform final validation with the repository Python scripts. Do not hand-create the initial package tree or initial package files. If any script reports invalid UTF-8, a BOM, or suspicious encoding markers, correct the corrupted content immediately and rerun the script until clean. Do not auto-invoke $architect-build."
